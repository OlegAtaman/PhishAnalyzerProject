{% extends 'base.html' %}
{% block 'title' %}
<title>Login to your account</title>
{% endblock %}
{% block 'content' %}
<nav>
  <a class="navbar-option" href="{% url 'mainpage' %}">Main page</a>
  <span class="nav-right-con">
    <a class="navbar-option" href="{% url 'enter_email' %}">Register</a>
  </span>
</nav>
<span class="login-wrapper"><div class="login-content">
<h1 class="guide-title">Log in</h1>
<form class="login-form-up" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="login-form">
    <div class="login-row">
      <label for="email">Email:</label>
      <input id="email" type="email" name="email">
    </div>
    <div class="login-row">
      <label for="password">Password:</label>
      <input id="password" type="password" name="password">
    </div>
    </div>
    <p class="register-hint" style="margin-top:0px;margin-bottom:0px">Forgot your password? <a href="{% url 'password_reset' %}">Password recovery</a>.</p>
    {% if messages %}
      {% for message in messages %}
        <div class="message {{ message.tags }}" style="margin-bottom: 0px;margin-top: 10px;">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
    <input class="login-submit" type="submit" value="Submit">
</form>
</div></span>
{% endblock %}
